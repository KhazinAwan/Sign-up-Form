<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign-up Form</title>
</head>

<body>

    <section class="sideBar">

        <div class="logo">
            <img src="./images/odin_logo.png" alt="Logo">
            <p>VOLLEY DISTRICT</p>
        </div>

    </section>

    <main class="content">

        <section class="intro">

            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Commodi soluta ipsum rerum mollitia dolorem
                voluptates quis modi, a eius</p>
            <p>Sign up now to get started!</p>

        </section>

        <section class="signUpForm">

            <div class="formIntro">

                <h2>Let's do this!</h2>

                <p>Please fill the following fields. <strong>All are required</strong></p>

            </div>

            <form>

                <div class="formControl">
                    <label for="firstName">First Name: </label>
                    <input type="text" id="firstName" placeholder="Unohana" name="firstName" required>
                </div>

                <div class="formControl">
                    <label for="lastName">Last Name: </label>
                    <input type="text" id="lastName" placeholder="Retsu" name="lastName" required>
                </div>

                <div class="formControl">
                    <label for="userEmail">Email: </label>
                    <input type="email" id="userEmail" placeholder="you@example.com" name="email" required>
                </div>

                <div class="formControl">
                    <label for="userPhoneNumber">Phone Number: </label>
                    <input type="tel" id="userPhoneNumber" placeholder="+92-3xx-xxxxxxx" name="phoneNumber" required>
                </div>

                <div class="formControl">
                    <label for="userPassword">Password: </label>
                    <input type="password" id="userPassword" name="password" required minlength="8">
                </div>

                <div class="formControl">
                    <label for="confirmUserPassword">Confirm Password: </label>
                    <input type="password" id="confirmUserPassword" name="password2" required minlength="8">
                </div>

                <div class="submission">
                    <button type="submit">Create Account</button>
                    <p>
                        Already have an Account?
                        <a href="#">Log in</a>
                    </p>
                </div>

            </form>

        </section>

    </main>



</body>

</html>
